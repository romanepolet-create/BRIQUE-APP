<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visite GMS - Formulaire</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
  
<body style="background: #f3b0cf">
  
  <div class="form-container">
    <div class="form-header">
      <h2>📝 Rapport de Visite</h2>
      <div id="store-info-badges">
      </div>
    </div>

    <form id="visiteForm">
      <input type="hidden" id="hubspot_id" name="hubspot_id">
      <input type="hidden" id="enseigne" name="enseigne">
      
      <div class="form-group">
        <label>Nom du Magasin</label>
        <input type="text" id="nom_magasin" name="nom_magasin" readonly style="background-color: #eee;">
      </div>

      <div class="form-group">
        <label>Nb Élément Canettes (historique)</label>
        <input type="number" id="nb_canettes" name="nb_canettes">
      </div>

      <div class="form-group">
        <label>Nb Élément Cave à Bière (historique)</label>
        <input type="number" id="nb_cave" name="nb_cave">
      </div>

      <hr style="border: 1px solid #eee; margin: 20px 0;">
      
      <h3 style="color: #002ab6;">Références Disponibles</h3>
      <div id="references-container">
      </div>

      <hr style="border: 1px solid #eee; margin: 20px 0;">

      <div class="form-group">
        <label>Mise en Avant (MEA) ?</label>
        <select id="mea_status" name="mea_status" onchange="toggleMEAFields()">
          <option value="NON">NON</option>
          <option value="OUI">OUI</option>
        </select>
      </div>

      <div id="mea_details" style="display: none; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px dashed #ccc;">
        <div class="form-group">
          <label>Volume Associé (colis)</label>
          <input type="number" id="mea_volume" name="mea_volume">
        </div>
        <div class="form-group">
          <label>Photo de la MEA*</label>
          <div 
            style="
              display: flex; 
              gap: 10px; 
              margin-top: 5px; 
              margin-bottom: 10px;">
            <button 
              type="button" 
              onclick="declencherDeclicPhoto('camera')" 
              style="
                flex: 1; 
                background-color: #002ab6; 
                color: white; 
                padding: 10px; 
                border: none; 
                border-radius: 6px; 
                font-weight: bold; 
                cursor: pointer; 
                font-size: 13px;">
              📸 Ouvrir l'appareil
            </button>
            <button 
              type="button" 
              onclick="declencherDeclicPhoto('galerie')" 
              style="
                flex: 1; 
                background-color: #e075aa; 
                color: white; 
                padding: 10px; 
                border: none; 
                border-radius: 6px; 
                font-weight: bold; 
                cursor: pointer; 
                font-size: 13px;">
              🖼️ Depuis la galerie
            </button>         
          </div>
          <input type="file" id="media-camera" accept="image/*" capture="environment" style="display: none;" onchange="traiterFichierPhoto(this)">
          <input type="file" id="media-galerie" accept="image/*" multiple style="display: none;" onchange="traiterFichierPhoto(this)">
          
          <div id="bloc-apercu-photo" style="display: none; text-align: center; margin-top: 15px;">
            <img 
              id="image-rendu-apercu" 
              src="" 
              style="max-width: 100%; max-height: 220px; border-radius: 8px; border: 3px solid #002ab6; box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
            <p 
              id="details-taille-photo" 
              style="font-size: 11px; 
              color: #666; 
              font-style: 
                italic; margin-top: 5px;"></p>
          </div>
        </div>
      </div>

      <hr style="
        border: 1px solid #eee; 
        margin: 20px 0;">
      <h3 style="
        color: #002ab6;">
        Notes / Commentaires (Locaux)
      </h3>
      <div class="form-group">
        <label for="new_note">
          Ajouter une note 
        </label>
        <textarea 
          id="new_note" 
          rows="3" 
          placeholder="Saisissez votre note ici..." 
          style="
            width: 100%; 
            box-sizing: border-box;">
        </textarea>
        <button 
          type="button" 
          id="btn-save-note" 
          style="
            margin-top: 5px; 
            background-color: #eee;  
            border: 1px solid #ccc; 
            padding: 5px 10px; 
            border-radius: 4px; 
            cursor: pointer;">
          Sauvegarder
        </button>
      </div>

      <button 
        type="button" 
        id="btn-view-notes" 
        style="
          background: none; 
          border: none; 
          color: #002ab6; 
          cursor: pointer; 
          text-decoration: underline; 
          font-size: 13px; 
          margin-top: 10px;"
        >>> Voir les commentaires
      </button>

  <div id="notes-modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4);">
    <div style="background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 80%; border-radius: 8px;">
      <span id="close-notes-modal" style="color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
      <h3>Historique des Notes</h3>
      <ul id="notes-list" style="list-style-type: none; padding: 0;">
        </ul>
    </div>
  </div>


      

      <button type="button" class="submit-btn" onclick="soumettreFormulaire()">Envoyer le rapport</button>
    </form>
  </div>

    <div 
      id="notes-modal" 
      style="
        display: none; 
        position: fixed; 
        z-index: 1000; 
        left: 0; top: 0; 
        width: 100%; height: 100%; 
        overflow: auto; 
        background-color: rgba(0,0,0,0.4);">
    <div 
      style="
        background-color: #fefefe; 
        margin: 15% auto; 
        padding: 20px; 
        border: 1px solid #888; 
        width: 80%; 
        border-radius: 8px;">
      <span 
        id="close-notes-modal" 
        style="
          color: #aaa; 
          float: right; 
          font-size: 28px; 
          font-weight: bold;
          cursor: pointer;">
        &times;
      </span>
      <h3>Historique des Notes</h3>
      <ul id="notes-list" style="list-style-type: none; padding: 0;">
        </ul>
    </div>
  </div>

  <script src="/js/formGMS.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async() => {
      const urlParams = new URLSearchParams(window.location.search);
      const hubspot_id = urlParams.get('id_hubspot');

      if(!hubspot_id) return ;

      try { const resConfig = await fetch('/api/config');
      const config = await resConfig.json();
      const supabase = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
           
      const { data, error } = await supabase
        .from('historique_visites')
        .select('*')
        .eq('hubspot_id', hubspot_id)
        .single();

      if (data) {
        const inputCanettes = document.getElementById('nb_canettes');
        const inputCave = document.getElementById('nb_cave');
        if(inputCanettes) inputCanettes.value = data.nb_canettes;
        if(inputCave) inputCave.value = data.nb_cave;

        setTimeout(() => {
        if (data.references) {
          for (const [key, value] of Object.entries(data.references)) {
            const checkbox = document.querySelector(`input[name="${key}"]`);
            if (checkbox) {
              checkbox.checked = (value === "OUI");
            }
          }
        }
        }, 100);
        console.log("Historique chargé avec succès !");
      }
    } catch (err) {
      console.error("Impossible de charger l'historique :", err);
    }
  });
  </script>
  <script src="/js/noteVisite.js"></script>
</body>
</html>
