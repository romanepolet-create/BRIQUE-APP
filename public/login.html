<!DOCTYPE html>
<html lang="fr">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brique App - Connexion</title>
</head>
<body 
  style= "
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    font-family: sans-serif; 
    background: #f3b0cf;">

  <div 
    style="
      background: white; 
      padding: 40px; 
      border-radius: 10px; 
      text-align: center; 
      border: 3px solid #002ab6;">
    
    <h2 style="color: #002ab6;">🍻 Brique App</h2>
    
    <input 
      type="email" 
      id="email" 
      placeholder="Adresse e-mail" 
      style="width: 100%; padding: 10px; margin-bottom: 10px;">
    
    <input 
      type="password" 
      id="password" 
      placeholder="Mot de passe" 
      style="width: 100%; padding: 10px; margin-bottom: 20px;">
    
    <button 
      id="btn-login" 
      style="
        background: #002ab6; 
        color: white; 
        border: none; 
        padding: 10px 20px; 
        margin: 10px;
        width: 100%; 
        cursor: pointer;">
      Se connecter
    </button>

    <button 
      id="btn-signup" 
      style="
        background: #002ab6; 
        color: white; 
        border: none; 
        padding: 10px 20px; 
        margin: 10px;
        width: 100%; 
        cursor: pointer;">
      Créer mon compte
    </button>
    
    <p id="message" style="font-size: 12px; margin-top: 10px; font-weight: bold;"></p>
  </div>

  <script>
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const messageEl = document.getElementById('message');

    document.getElementById('btn-signup').onclick = async function() {
      messageEl.style.color = "blue";
      messageEl.innerText = "Création en cours...";
      
      const response = await fetch('/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: emailInput.value, password: passwordInput.value })
      });
      const data = await response.json();

      if (response.ok) {
        messageEl.style.color = "green";
        messageEl.innerText = "✅ " + data.message; // "Vérifie tes emails..."
      } else {
        messageEl.style.color = "red";
        messageEl.innerText = "❌ " + data.error;
      }
    };

    document.getElementById('btn-login').onclick = async function() {
      messageEl.style.color = "blue";
      messageEl.innerText = "Connexion...";

      const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: emailInput.value, password: passwordInput.value })
      });
      
      const data = await response.json();

      if (response.ok) {
        messageEl.style.color = "green";
        messageEl.innerText = "✅ Connexion réussie ! Redirection...";
        window.location.href = '/index.html'; 
      } else {
        messageEl.style.color = "red";
        messageEl.innerText = "❌ " + data.error;
      }
    };

  </script>
</body>
</html>
